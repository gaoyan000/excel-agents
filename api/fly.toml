# fly.toml app configuration file generated for spreadsheet-agent-api on 2026-05-19T15:55:48-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'spreadsheet-agent-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGINS = 'https://spreadsheet-agent.pages.dev'
  STORAGE_BACKEND = 'local'
  STORAGE_DIR = '/data/storage'

[[mounts]]
  source = 'ssa_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
